<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pattern Console Output</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Consolas, "Courier New", monospace;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #050505;
        color: #f2f2f2;
      }

      main {
        width: min(900px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      .terminal {
        min-height: calc(100vh - 64px);
        padding: 22px;
        border: 1px solid #2b2b2b;
        background: #0b0b0b;
      }

      .line {
        margin: 0 0 12px;
        color: #9cdcfe;
        white-space: pre-wrap;
      }

      form {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }

      label {
        color: #9cdcfe;
      }

      input {
        flex: 1;
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
        color: #f2f2f2;
        font: inherit;
      }

      pre {
        margin: 0;
        color: #ffffff;
        font-size: 18px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .comment {
        color: #6a9955;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="terminal" aria-label="Console output">
        <form id="command-form">
          <label for="command">PS D:\git\programming-skill-test-submission&gt;</label>
          <input id="command" name="command" value="node answers/pattern.js 1 4 3" autocomplete="off">
        </form>
        <p class="line comment">// Output</p>
        <pre id="output"></pre>
      </section>
    </main>

    <script src="pattern.js"></script>
    <script>
      const form = document.querySelector("#command-form");
      const command = document.querySelector("#command");
      const output = document.querySelector("#output");

      function runCommand() {
        const parts = command.value.trim().split(/\s+/);
        const character = parts[2] || "1";
        const maxCount = parsePositiveInteger(parts[3], 4, "maxCount");
        const rounds = parsePositiveInteger(parts[4], 3, "rounds");

        output.textContent = buildPattern(character, maxCount, rounds).join("\n");
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        try {
          runCommand();
        } catch (error) {
          output.textContent = error.message;
        }
      });

      runCommand();
    </script>
  </body>
</html>
